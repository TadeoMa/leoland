<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Neón</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐍 SNAKE NEÓN</h1>
            <div class="scores">
                <div class="score-box">
                    <span class="label">PUNTOS</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-box">
                    <span class="label">RÉCORD</span>
                    <span id="highscore" class="value">0</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="gameOver" class="game-over hidden">
            <h2>💀 GAME OVER 💀</h2>
            <p>Puntuación: <span id="finalScore">0</span></p>
            <button id="restartBtn">🔄 JUGAR DE NUEVO</button>
        </div>
        
        <div id="startScreen" class="start-screen">
            <h2>🎮 ¿LISTO?</h2>
            <p>Usa las flechas ⬆️⬇️⬅️➡️ o WASD</p>
            <button id="startBtn">▶️ EMPEZAR</button>
        </div>
        
        <div class="controls-mobile">
            <button class="control-btn" data-dir="up">⬆️</button>
            <div class="control-row">
                <button class="control-btn" data-dir="left">⬅️</button>
                <button class="control-btn" data-dir="down">⬇️</button>
                <button class="control-btn" data-dir="right">➡️</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
