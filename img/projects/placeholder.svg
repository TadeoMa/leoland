<svg xmlns="http://www.w3.org/2000/svg" width="370" height="189" viewBox="0 0 370 189">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="370" height="189" fill="url(#bg)" rx="8"/>

  <!-- Dashed border -->
  <rect x="10" y="10" width="350" height="169" rx="6"
        fill="none" stroke="#6c63ff" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.5"/>

  <!-- Mountain silhouette -->
  <polygon points="80,140 130,80 180,140" fill="#6c63ff" opacity="0.25"/>
  <polygon points="140,140 200,65 260,140" fill="#a78bfa" opacity="0.2"/>

  <!-- Sun/circle -->
  <circle cx="270" cy="85" r="22" fill="#facc15" opacity="0.18"/>

  <!-- Image icon -->
  <rect x="155" y="68" width="60" height="44" rx="5"
        fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
  <circle cx="169" cy="82" r="5" fill="#facc15" opacity="0.7"/>
  <polyline points="155,105 175,88 190,100 205,84 215,112"
            fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>

  <!-- Label -->
  <text x="185" y="135"
        font-family="'Segoe UI', sans-serif" font-size="12"
        fill="#c4b5fd" text-anchor="middle" opacity="0.8">
    Sin imagen
  </text>
</svg>
